<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unredact</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h1>UNREDACT</h1>
    <p class="subtitle">Epstein Files Redaction Analysis</p>
  </header>

  <main>
    <section id="upload-section">
      <div id="drop-zone">
        <p>Drop a PDF here or click to upload</p>
        <input type="file" id="file-input" accept=".pdf" hidden>
      </div>
    </section>

    <section id="viewer-section" hidden>
      <div id="controls">
        <button id="prev-page" disabled>&lt; Prev</button>
        <span id="page-info">Page 1 / 1</span>
        <button id="next-page" disabled>Next &gt;</button>
        <span class="controls-sep"></span>
        <button id="zoom-out">-</button>
        <span id="zoom-level">100%</span>
        <button id="zoom-in">+</button>
        <button id="zoom-fit">Fit</button>
      </div>

      <div id="workspace">
        <div id="left-panel">
          <div id="redaction-list"></div>
        </div>

        <div id="right-panel">
          <div id="popover" hidden>
            <div class="popover-header">
              <span class="popover-title">Analyze Redaction</span>
              <button id="popover-close" class="popover-close-btn">X</button>
            </div>
            <div id="popover-context" class="popover-context"></div>
            <div id="popover-font-info" class="popover-font-info"></div>
            <div class="solve-controls">
              <label>
                Charset
                <select id="solve-charset">
                  <option value="lowercase">lowercase</option>
                  <option value="uppercase">UPPERCASE</option>
                  <option value="capitalized">Capitalized</option>
                  <option value="full_name_capitalized">Full Name</option>
                  <option value="full_name_caps">FULL NAME</option>
                  <option value="alpha">Mixed Case</option>
                  <option value="alphanumeric">Alphanumeric</option>
                </select>
              </label>
              <label>
                Tolerance
                <input type="range" id="solve-tolerance" min="0" max="5" step="0.5" value="0">
                <span id="solve-tol-value">0</span>px
              </label>
              <label>
                Mode
                <select id="solve-mode">
                  <option value="enumerate">Enumerate</option>
                  <option value="dictionary">Dictionary</option>
                  <option value="both">Both</option>
                  <option value="emails">Emails</option>
                </select>
              </label>
              <label>
                Filter
                <select id="solve-filter">
                  <option value="none">None</option>
                  <option value="words">English words</option>
                  <option value="names">Names</option>
                  <option value="both">Words + Names</option>
                </select>
              </label>
              <label>
                Filter prefix
                <input type="text" id="solve-filter-prefix" placeholder="e.g. j" spellcheck="false" autocomplete="off">
              </label>
              <label>
                Filter suffix
                <input type="text" id="solve-filter-suffix" placeholder="e.g. son" spellcheck="false" autocomplete="off">
              </label>
            </div>
            <div class="solve-actions">
              <button id="solve-start" class="solve-btn">Solve</button>
              <button id="solve-stop" class="solve-btn" hidden>Stop</button>
              <button id="solve-accept" class="solve-btn accept" hidden>Accept</button>
              <span id="solve-status"></span>
            </div>
            <div id="solve-results"></div>
          </div>
          <div id="doc-container">
            <img id="doc-image" alt="Document page">
            <canvas id="overlay-canvas"></canvas>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
